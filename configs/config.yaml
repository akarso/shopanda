# Shopanda Configuration
#
# Override any value with environment variables:
#   SHOPANDA_SERVER_PORT=9090

server:
  host: "0.0.0.0"
  port: 8080

database:
  host: "localhost"
  port: 5432
  user: "shopanda"
  password: "shopanda"
  name: "shopanda"
  sslmode: "disable"

log:
  level: "info"
  format: "json"

auth:
  # jwt_secret: Set via SHOPANDA_AUTH_JWT_SECRET (required; app refuses to start without it)
  jwt_ttl: "24h"

cache:
  driver: "postgres"
