# =============================================================================
# Shopanda — Docker Compose
# =============================================================================
# Default profile:  app + postgres
# Dev profile:      adds mailpit   (docker compose --profile dev up)
# Search profile:   adds meilisearch (docker compose --profile search up)
#
# Quick start:
#   cp .env.example .env          # edit values
#   docker compose up -d
#   docker compose run --rm app migrate
#   docker compose run --rm app seed
# =============================================================================

services:
  # ---------- Application -----------------------------------------------------
  app:
    build: .
    ports:
      - "${SHOPANDA_SERVER_PORT:-8080}:8080"
    environment:
      # Service-to-service defaults — override .env / config defaults that
      # assume localhost, which is unreachable from inside the container.
      SHOPANDA_DATABASE_HOST: postgres
      # Mailpit (dev profile). If mailpit is not running, mail simply fails
      # on connection refused — harmless for local development.
      SHOPANDA_MAIL_SMTP_HOST: mailpit
      SHOPANDA_MAIL_SMTP_PORT: 1025
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ---------- PostgreSQL ------------------------------------------------------
  # Pinned 2026-04-17; refresh periodically.
  postgres:
    image: postgres:17-alpine@sha256:778d0b486d6daa02b77434d0358ec57a1b21fd8b6d22ac2eef56a33e816928f6
    environment:
      POSTGRES_DB: "${SHOPANDA_DATABASE_NAME:-shopanda}"
      POSTGRES_USER: "${SHOPANDA_DATABASE_USER:-shopanda}"
      POSTGRES_PASSWORD: "${SHOPANDA_DATABASE_PASSWORD:-changeme}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SHOPANDA_DATABASE_USER:-shopanda}"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5
    restart: unless-stopped

  # ---------- Mailpit (dev profile) -------------------------------------------
  # Local SMTP sink — UI at http://localhost:8025
  # Pinned 2026-04-17; refresh periodically.
  mailpit:
    image: axllent/mailpit:v1.22@sha256:f7f7c31de4de59540ad6515a0ca057a77525bca2069b6e747d873ca66c10fe08
    ports:
      - "127.0.0.1:8025:8025"   # Web UI
      - "127.0.0.1:1025:1025"   # SMTP
    profiles: ["dev"]
    restart: unless-stopped

  # ---------- Meilisearch (search profile) ------------------------------------
  # Full-text search engine — API at http://localhost:7700
  # Pinned 2026-04-17; refresh periodically.
  meilisearch:
    image: getmeili/meilisearch:v1.13@sha256:bed3fb650e62da53145777204891159242f6ea4ce69e215b36223af4aa64a0ae
    environment:
      # No MEILI_MASTER_KEY — intentionally unprotected for local dev only.
      # For internet-exposed deployments, set MEILI_MASTER_KEY to a strong secret.
      MEILI_ENV: "development"
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "127.0.0.1:7700:7700"
    volumes:
      - meilidata:/meili_data
    profiles: ["search"]
    restart: unless-stopped

volumes:
  pgdata:
  meilidata:
