<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <style>
    body { margin: 0; padding: 0; background: #f4f4f7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    .container { max-width: 600px; margin: 0 auto; background: #ffffff; }
    .header { padding: 24px; text-align: center; background: #ffffff; border-bottom: 1px solid #eaeaea; }
    .header img { max-height: 48px; }
    .content { padding: 32px 24px; color: #333333; line-height: 1.6; }
    .footer { padding: 24px; text-align: center; font-size: 13px; color: #999999; border-top: 1px solid #eaeaea; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      {{if .LogoURL}}<img src="{{.LogoURL}}" alt="{{.StoreName}}">{{else}}<strong>{{.StoreName}}</strong>{{end}}
    </div>
    <div class="content">
      {{.Body}}
    </div>
    <div class="footer">
      <p>{{.StoreName}} — {{.StoreAddress}}</p>
    </div>
  </div>
</body>
</html>
