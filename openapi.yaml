# ══════════════════════════════════════════════════════════
# Components
# ══════════════════════════════════════════════════════════
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
    ProductId:
      name: id
      in: path
      required: true
      schema:
        type: string
    VariantId:
      name: variantId
      in: path
      required: true
      schema:
        type: string
    CartId:
      name: cartId
      in: path
      required: true
      schema:
        type: string
    OrderId:
      name: orderId
      in: path
      required: true
      schema:
        type: string
    CategoryId:
      name: id
      in: path
      required: true
      schema:
        type: string
    GenericId:
      name: id
      in: path
      required: true
      schema:
        type: string

  schemas:
    Envelope:
      type: object
      properties:
        data:
          description: Response payload (null on error)
        error:
          $ref: "#/components/schemas/ErrorBody"

    ErrorBody:
      type: object
      nullable: true
      properties:
        code:
          type: string
          enum:
            - not_found
            - conflict
            - validation
            - unauthorized
            - forbidden
            - rate_limited
            - internal
        message:
          type: string

    RegisterRequest:
      type: object
      required: [email, password, first_name, last_name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        first_name:
          type: string
        last_name:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    CreateProductRequest:
      type: object
      required: [name, slug, description]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        attributes:
          type: object
          additionalProperties: true

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [active, draft, archived]
        attributes:
          type: object
          additionalProperties: true

    CreateVariantRequest:
      type: object
      required: [sku, name]
      properties:
        sku:
          type: string
        name:
          type: string
        attributes:
          type: object
          additionalProperties: true

    UpdateVariantRequest:
      type: object
      properties:
        sku:
          type: string
        name:
          type: string
        attributes:
          type: object
          additionalProperties: true

    CreatePageRequest:
      type: object
      required: [slug, title, content]
      properties:
        slug:
          type: string
        title:
          type: string
        content:
          type: string
        is_active:
          type: boolean

    UpdatePageRequest:
      type: object
      properties:
        slug:
          type: string
        title:
          type: string
        content:
          type: string
        is_active:
          type: boolean

    CreateStoreRequest:
      type: object
      required: [code, name, currency, country, language, domain]
      properties:
        code:
          type: string
        name:
          type: string
        currency:
          type: string
        country:
          type: string
        language:
          type: string
        domain:
          type: string
        is_default:
          type: boolean

    UpdateStoreRequest:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        currency:
          type: string
        country:
          type: string
        language:
          type: string
        domain:
          type: string
        is_default:
          type: boolean

    CartEnvelope:
      type: object
      properties:
        data:
          type: object
          properties:
            cart:
              $ref: "#/components/schemas/Cart"
        error:
          $ref: "#/components/schemas/ErrorBody"

    Cart:
      type: object
      properties:
        id:
          type: string
        customer_id:
          type: string
        status:
          type: string
          enum: [active, checked_out, abandoned]
        currency:
          type: string
        coupon_code:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CartItem:
      type: object
      properties:
        variant_id:
          type: string
        quantity:
          type: integer
        unit_price:
          type: integer
          format: int64
          description: Price in smallest currency unit (e.g. cents)
        currency:
          type: string
        line_total:
          type: integer
          format: int64
          description: quantity * unit_price

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
          example:
            data: null
            error:
              code: unauthorized
              message: authentication required
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
          example:
            data: null
            error:
              code: forbidden
              message: insufficient permissions
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
          example:
            data: null
            error:
              code: not_found
              message: not found
    Validation:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
          example:
            data: null
            error:
              code: validation
              message: invalid input
    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
            example: 1
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
          example:
            data: null
            error:
              code: rate_limited
              message: rate limit exceeded
